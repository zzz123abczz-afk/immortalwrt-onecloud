name: Build ImmortalWrt for OneCloud (S805)

on:
  workflow_dispatch:
    inputs:
      UPLOAD_RELEASE:
        description: 'Upload to Releases?'
        required: true
        default: 'true'
        type: boolean

permissions:
  contents: write   # 发布Release必需权限

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      REPO_URL: immortalwrt/immortalwrt
      REPO_BRANCH: openwrt-23.05
      CCACHE_DIR: ${{ github.workspace }}/ccache
      CCACHE_MAXSIZE: 20G

    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 5120  # 修正：预留5GB空间
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: Checkout current repo (for custom .config)
        uses: actions/checkout@v4

      - name: Restore ccache cache  # 新增：加速后续编译
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-onecloud-${{ github.run_id }}
          restore-keys: |
            ccache-onecloud-

      - name: Checkout ImmortalWrt source (with China mirror)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.REPO_URL }}
          ref: ${{ env.REPO_BRANCH }}
          path: openwrt

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential flex bison libssl-dev libncurses-dev \
            unzip python3 python3-pip python3-distutils python3-setuptools \
            libz-dev libbz2-dev libreadline-dev libsqlite3-dev \
            wget curl libgnutls28-dev libjson-c-dev git rsync perl gawk gettext \
            libelf-dev libncurses5-dev libncursesw5-dev xsltproc zlib1g-dev \
            subversion swig time ccache

      - name: Use China mirrors (加速下载)
        working-directory: openwrt
        run: |
          sed -i 's#https://github.com/#https://mirror.ghproxy.com/https://github.com/#g' feeds.conf.default

      - name: Update feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Prepare .config file
        working-directory: openwrt
        run: |
          # 优先使用仓库根目录的自定义.config
          if [ -f $GITHUB_WORKSPACE/.config ]; then
            echo "Using custom .config from repository root"
            cp $GITHUB_WORKSPACE/.config .config
          else
            echo "No custom .config found, generating default OneCloud S805 config"
            cat > .config << 'EOF'
          # 核心平台配置（修正了设备名大小写）
          CONFIG_TARGET_amlogic=y
          CONFIG_TARGET_amlogic_s805=y
          CONFIG_TARGET_amlogic_s805_DEVICE_OneCloud=y
          
          # 生成SD卡镜像（直接写U盘/SD卡启动）
          CONFIG_TARGET_IMAGES_GZIP=y
          CONFIG_TARGET_ROOTFS_EXT4FS=y
          CONFIG_TARGET_ROOTFS_TARGZ=y
          
          # 玩客云S805必需驱动
          CONFIG_PACKAGE_kmod-usb-storage=y
          CONFIG_PACKAGE_kmod-usb-ohci=y
          CONFIG_PACKAGE_kmod-usb-uhci=y
          CONFIG_PACKAGE_kmod-sdhci=y
          CONFIG_PACKAGE_kmod-sdhci-meson=y
          
          # 常用插件
          CONFIG_PACKAGE_luci-app-openclash=y
          CONFIG_PACKAGE_luci-app-adblock=y
          CONFIG_PACKAGE_luci-app-samba4=y
          CONFIG_PACKAGE_luci-app-diskman=y
          CONFIG_PACKAGE_luci-app-docker=y
          CONFIG_PACKAGE_luci-app-upnp=y
          CONFIG_PACKAGE_luci-app-wol=y
          
          # 常用工具
          CONFIG_PACKAGE_htop=y
          CONFIG_PACKAGE_nano=y
          CONFIG_PACKAGE_curl=y
          CONFIG_PACKAGE_wget=y
          EOF
          fi
          
          # 应用配置并生成完整.config
          make defconfig

      - name: Download all source packages
        working-directory: openwrt
        run: make download -j$(nproc) V=s

      - name: Compile firmware (with ccache)
        working-directory: openwrt
        run: |
          export CCACHE_DIR=${{ env.CCACHE_DIR }}
          export CCACHE_MAXSIZE=${{ env.CCACHE_MAXSIZE }}
          make CCACHE=1 -j$(nproc) V=s

      - name: Upload artifact (保留30天)
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-OneCloud-S805
          path: openwrt/bin/targets/amlogic/s805/
          retention-days: 30

      - name: Upload to Releases
        if: github.event.inputs.UPLOAD_RELEASE == 'true'
        uses: softprops/action-gh-release@v1
        with:
          files: openwrt/bin/targets/amlogic/s805/*.img.gz
          tag_name: build-${{ github.run_number }}
          body: |
            # ImmortalWrt for OneCloud (S805)
            - 目标平台: Amlogic S805 (ARMv7)
            - 源码分支: ${{ env.REPO_BRANCH }}
            - 编译时间: ${{ github.event.head_commit.timestamp }}
            - 默认登录: http://192.168.1.1
            - 默认账号: root
            - 默认密码: 无（首次登录强制设置）
          token: ${{ secrets.GITHUB_TOKEN }}
